# release: publish @hop-mesh/endpoint to npm on a semver tag.
#
# In the monorepo this file is inert (GitHub only runs root .github/workflows).
# Copybara mirrors sdk/node to its own repo, where package.json sits at the repo
# root and this becomes the repo-root release workflow.
name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# OIDC trusted publishing: id-token lets the npm CLI authenticate to the registry via GitHub OIDC, so
# there is no long-lived token. Configure the trusted publisher on npmjs.com first (package
# @hop-mesh/endpoint, org hop-mesh, repository hopmesh/hop-sdk-node, workflow release.yml). To use a
# token instead, set the NPM_TOKEN secret and swap the publish step for the commented NODE_AUTH_TOKEN form.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Guard: the tag (minus its leading v) must equal package.json's version, so a
      # mistyped tag can never publish the wrong version.
      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "tag $tag does not match package.json version $pkg" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      # OIDC trusted publishing needs a recent npm (>= 11.5.1); node 22 ships an older one.
      - name: Update npm for OIDC
        run: npm install -g npm@latest

      # @hop-mesh/endpoint is scoped, so --access public makes it a public publish. --provenance
      # attaches a signed build-provenance statement (also via OIDC).
      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public --provenance
        # Token fallback (if you did not set up a trusted publisher): drop --provenance, drop the
        # id-token permission, and add:  env: { NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} }
