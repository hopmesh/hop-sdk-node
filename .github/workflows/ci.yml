# DORMANT in the monorepo: GitHub only runs workflows in the ROOT .github/workflows/, so this file does
# nothing here. It ACTIVATES in the standalone hop-sdk-node repo, where Copybara strips the sdk/node/
# prefix and this lands at .github/workflows/ci.yml (the root). There it downloads a prebuilt libhop and
# runs the same tests the monorepo runs, via the SAME canonical composite action (./.github/actions/ci).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/ci
        with:
          pkg-dir: "."
          libhop-source: download
          libhop-sha256: ${{ matrix.os == 'ubuntu-24.04' && vars.LIBHOP_LINUX_X64_SHA256 || vars.LIBHOP_MACOS_X64_SHA256 }}
